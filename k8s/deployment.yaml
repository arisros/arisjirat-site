apiVersion: apps/v1
kind: Deployment
metadata:
  name: arisjirat-site
  namespace: apps
  labels:
    app: arisjirat-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arisjirat-site
  template:
    metadata:
      labels:
        app: arisjirat-site
    spec:
      containers:
        - name: site
          image: ghcr.io/arisros/arisjirat-site:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: arisjirat-site
  namespace: apps
spec:
  selector:
    app: arisjirat-site
  ports:
    - port: 80
      targetPort: 80
      # NodePort 30080 — registered in homelab port registry (app-deployment-guide §5)
      # Traffic: Cloudflare → VPS Caddy → WireGuard → Homelab Caddy:30080 → this pod
      nodePort: 30080
  type: NodePort
