<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img">
<title>Diagram perbandingan storage non-volatile dan RAM volatile</title>
<g font-family="sans-serif" fill="#525252" stroke="#525252" stroke-width="2">
<text x="600" y="40" font-size="20" text-anchor="middle" stroke="none" font-weight="bold">Storage vs Memory</text>
<line x1="600" y1="70" x2="600" y2="520" stroke="#A3A3A3" stroke-dasharray="6 6"/>

<text x="280" y="95" font-size="18" text-anchor="middle" stroke="none" font-weight="bold">Storage (Non-volatile)</text>

<ellipse cx="160" cy="160" rx="55" ry="18" fill="none"/>
<ellipse cx="160" cy="160" rx="20" ry="6" fill="#A3A3A3" stroke="none"/>
<line x1="160" y1="142" x2="215" y2="142"/>
<text x="230" y="165" font-size="14" stroke="none">HDD platter</text>

<rect x="105" y="210" width="110" height="50" fill="none" rx="4"/>
<rect x="120" y="225" width="20" height="20" fill="#A3A3A3" stroke="none"/>
<rect x="150" y="225" width="20" height="20" fill="#A3A3A3" stroke="none"/>
<rect x="180" y="225" width="20" height="20" fill="#A3A3A3" stroke="none"/>
<text x="230" y="240" font-size="14" stroke="none">SSD chip</text>

<rect x="105" y="285" width="80" height="35" fill="none" rx="3"/>
<rect x="185" y="295" width="25" height="15" fill="#A3A3A3" stroke="none"/>
<text x="230" y="310" font-size="14" stroke="none">USB flash</text>

<circle cx="160" cy="370" r="28" fill="none"/>
<circle cx="160" cy="370" r="6" fill="#A3A3A3" stroke="none"/>
<text x="230" y="375" font-size="14" stroke="none">Optical disc</text>

<rect x="80" y="420" width="400" height="70" fill="none" rx="6" stroke="#F37338"/>
<text x="280" y="450" font-size="15" text-anchor="middle" stroke="none" fill="#F37338" font-weight="bold">Data tetap utuh</text>
<text x="280" y="472" font-size="15" text-anchor="middle" stroke="none" fill="#F37338">saat komputer mati</text>

<text x="900" y="95" font-size="18" text-anchor="middle" stroke="none" font-weight="bold">Memory / RAM (Volatile)</text>

<rect x="730" y="180" width="340" height="80" fill="none" rx="6"/>
<line x1="730" y1="240" x2="1070" y2="240"/>
<g fill="#A3A3A3" stroke="none">
<rect x="750" y="195" width="28" height="35"/>
<rect x="788" y="195" width="28" height="35"/>
<rect x="826" y="195" width="28" height="35"/>
<rect x="864" y="195" width="28" height="35"/>
<rect x="902" y="195" width="28" height="35"/>
<rect x="940" y="195" width="28" height="35"/>
<rect x="978" y="195" width="28" height="35"/>
<rect x="1016" y="195" width="28" height="35"/>
</g>
<g stroke="#525252" stroke-width="1">
<line x1="760" y1="260" x2="760" y2="252"/>
<line x1="780" y1="260" x2="780" y2="252"/>
<line x1="800" y1="260" x2="800" y2="252"/>
<line x1="820" y1="260" x2="820" y2="252"/>
<line x1="840" y1="260" x2="840" y2="252"/>
<line x1="860" y1="260" x2="860" y2="252"/>
<line x1="880" y1="260" x2="880" y2="252"/>
<line x1="900" y1="260" x2="900" y2="252"/>
<line x1="920" y1="260" x2="920" y2="252"/>
<line x1="940" y1="260" x2="940" y2="252"/>
<line x1="960" y1="260" x2="960" y2="252"/>
<line x1="980" y1="260" x2="980" y2="252"/>
<line x1="1000" y1="260" x2="1000" y2="252"/>
<line x1="1020" y1="260" x2="1020" y2="252"/>
<line x1="1040" y1="260" x2="1040" y2="252"/>
</g>
<text x="900" y="290" font-size="14" text-anchor="middle" stroke="none">RAM stick (DIMM)</text>

<rect x="730" y="420" width="340" height="70" fill="none" rx="6" stroke="#F37338"/>
<text x="900" y="450" font-size="15" text-anchor="middle" stroke="none" fill="#F37338" font-weight="bold">Data hilang</text>
<text x="900" y="472" font-size="15" text-anchor="middle" stroke="none" fill="#F37338">saat komputer mati</text>

<defs>
<marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
<path d="M0,0 L10,5 L0,10 z" fill="#F37338" stroke="none"/>
</marker>
</defs>

<rect x="150" y="600" width="160" height="100" fill="none" rx="6"/>
<rect x="175" y="625" width="110" height="55" fill="none"/>
<circle cx="230" cy="652" r="10" fill="#A3A3A3" stroke="none"/>
<text x="230" y="720" font-size="15" text-anchor="middle" stroke="none">CPU / Komputer</text>

<line x1="320" y1="650" x2="780" y2="650" stroke="#F37338" stroke-width="3" marker-end="url(#ar)"/>
<text x="550" y="640" font-size="16" text-anchor="middle" stroke="none" fill="#F37338" font-weight="bold">Storage Device</text>
<text x="550" y="672" font-size="13" text-anchor="middle" stroke="none">read / write</text>

<rect x="790" y="600" width="220" height="100" fill="none" rx="6" stroke-width="3"/>
<text x="900" y="640" font-size="16" text-anchor="middle" stroke="none" font-weight="bold">Media Penyimpanan</text>
<text x="900" y="665" font-size="13" text-anchor="middle" stroke="none">(disk, chip, dll.)</text>
<text x="900" y="688" font-size="13" text-anchor="middle" stroke="none" fill="#F37338">Kapasitas = jumlah byte</text>

<text x="600" y="770" font-size="13" text-anchor="middle" stroke="none">Storage device = perangkat yang membaca/menulis ke media penyimpanan</text>
</g>
</svg>