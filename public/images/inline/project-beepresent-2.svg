<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img"><title>Alur caching dan invalidasi data mata kuliah dengan TTL satu minggu</title><g font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle"><rect x="470" y="30" width="260" height="56" rx="28" ry="28" fill="none" stroke="#525252" stroke-width="2"/><text x="600" y="63">Request course data</text><path d="M600 130 L780 200 L600 270 L420 200 Z" fill="none" stroke="#525252" stroke-width="2"/><text x="600" y="196">Cache entry</text><text x="600" y="215">exists?</text><line x1="600" y1="86" x2="600" y2="128" stroke="#525252" stroke-width="2"/><polygon points="600,130 595,120 605,120" fill="#525252"/><line x1="420" y1="200" x2="220" y2="200" stroke="#525252" stroke-width="2"/><polygon points="218,200 228,195 228,205" fill="#525252"/><text x="320" y="192" fill="#F37338">No</text><line x1="780" y1="200" x2="980" y2="200" stroke="#525252" stroke-width="2"/><polygon points="982,200 972,195 972,205" fill="#525252"/><text x="880" y="192" fill="#F37338">Yes</text><rect x="100" y="270" width="240" height="56" fill="none" stroke="#525252" stroke-width="2"/><text x="220" y="304">Crawl source (HTML)</text><line x1="220" y1="200" x2="220" y2="268" stroke="#525252" stroke-width="2"/><polygon points="220,270 215,260 225,260" fill="#525252"/><rect x="100" y="370" width="240" height="56" fill="none" stroke="#525252" stroke-width="2"/><text x="220" y="404">Parse with Cheerio</text><line x1="220" y1="326" x2="220" y2="368" stroke="#525252" stroke-width="2"/><polygon points="220,370 215,360 225,360" fill="#525252"/><rect x="80" y="470" width="280" height="56" fill="none" stroke="#525252" stroke-width="2"/><text x="220" y="494">Store in cache with</text><text x="220" y="513">1-week TTL</text><line x1="220" y1="426" x2="220" y2="468" stroke="#525252" stroke-width="2"/><polygon points="220,470 215,460 225,460" fill="#525252"/><path d="M860 270 L1100 270 L1100 340 L860 340 Z" fill="none" stroke="#525252" stroke-width="2" stroke-dasharray="0"/><path d="M860 305 L860 305" stroke="none"/><path d="M860 305 L1100 305 L1100 305 Z" stroke="none"/><path d="M980 270 L1100 305 L980 340 L860 305 Z" fill="none" stroke="#525252" stroke-width="2"/><text x="980" y="301">Entry older than</text><text x="980" y="319">1 week?</text><line x1="980" y1="270" x2="980" y2="228" stroke="#525252" stroke-width="2"/><text x="980" y="252">↑</text><line x1="860" y1="305" x2="620" y2="305" stroke="#525252" stroke-width="2"/><text x="740" y="297" fill="#F37338">No</text><line x1="980" y1="340" x2="980" y2="430" stroke="#525252" stroke-width="2"/><text x="998" y="385" fill="#F37338">Yes</text><path d="M980 430 L980 600 L340 600 L340 498" fill="none" stroke="#525252" stroke-width="2" stroke-dasharray="6 4"/><polygon points="340,498 335,510 345,510" fill="#525252"/><text x="660" y="592" font-size="13">loop back to refresh</text><rect x="480" y="660" width="240" height="56" rx="28" ry="28" fill="none" stroke="#525252" stroke-width="2"/><text x="600" y="693">Return data</text><line x1="220" y1="526" x2="220" y2="688" stroke="#525252" stroke-width="2"/><line x1="220" y1="688" x2="478" y2="688" stroke="#525252" stroke-width="2"/><polygon points="480,688 470,683 470,693" fill="#525252"/><line x1="620" y1="305" x2="600" y2="660" stroke="#525252" stroke-width="2"/><polygon points="600,660 593,652 603,650" fill="#525252"/><rect x="820" y="510" width="340" height="80" fill="none" stroke="#F37338" stroke-width="2" stroke-dasharray="5 4"/><text x="990" y="540" fill="#F37338" font-size="14">No invalidation on access —</text><text x="990" y="562" fill="#F37338" font-size="14">stale-until-expired</text><text x="990" y="582" font-size="12">(side note)</text></g></svg>