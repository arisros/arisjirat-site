oubleshooting</text><text x="200" y="34" fill="#A3A3A3" font-size="13">lab diagnosa dan perbaikan</text></g><g transform="translate(0,430)"><path d="M82 0h68" stroke="#525252" stroke-width="2" fill="none"/><use href="#r"/><text x="200" y="16">06-Referensi</text><text x="200" y="34" fill="#A3A3A3" font-size="13">cheat sheet perintah IOS</text></g><g transform="translate(0,480)"><path d="M82 0h68" stroke="#525252" stroke-width="2" fill="none"/><use href="#r"/><text x="200" y="16">07-Template</text><text x="200" y="34" fill="#A3A3A3" font-size="13">template laporan dan addressing</text></g><g transform="translate(0,530)"><path d="M82 0h68" stroke="#525252" stroke-width="2" fill="none"/><use href="#r"/><text x="200" y="16">08-Lab-Saya</text><text x="200" y="34" fill="#A3A3A3" font-size="13">file .pkt hasil praktik</text></g><g transform="translate(0,580)"><path d="M82 0h68" stroke="#525252" stroke-width="2" fill="none"/><g stroke="#F37338" stroke-width="2" fill="none"><path d="M150 0h36v22h-36z"/><path d="M150 0v-5h14l5 5h17v4"/></g><text x="200" y="16" fill="#F37338">09-Laporan-Akhir</text><text x="200" y="34" fill="#A3A3A3" font-size="13">laporan dan deliverable final</text></g></g><g font-family="sans-serif" font-size="13" fill="#A3A3A3"><text x="640" y="120">Progres belajar</text><path d="M640 135v470" stroke="#A3A3A3" stroke-width="2" fill="none" stroke-dasharray="4 4"/><path d="M634 600l6 12 6-12z" fill="#A3A3A3"/><text x="660" y="150" fill="#525252">mulai: konsep dasar</text><text x="660" y="360" fill="#525252">inti: jaringan dan layanan</text><text x="660" y="580" fill="#F37338">akhir: laporan</text></g></svg>