<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img">
<title>Diagram struktur internal HDD: piringan, trek, sektor, dan head</title>
<text x="600" y="32" font-family="sans-serif" font-size="20" fill="#525252" text-anchor="middle">Struktur Internal HDD</text>

<text x="270" y="62" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">Tampak Samping</text>
<rect x="260" y="140" width="20" height="370" fill="#A3A3A3" stroke="#525252" stroke-width="2"/>
<ellipse cx="270" cy="190" rx="180" ry="16" fill="none" stroke="#525252" stroke-width="2"/>
<ellipse cx="270" cy="310" rx="180" ry="16" fill="none" stroke="#525252" stroke-width="2"/>
<ellipse cx="270" cy="430" rx="180" ry="16" fill="none" stroke="#525252" stroke-width="2"/>
<text x="55" y="195" font-family="sans-serif" font-size="14" fill="#525252">Piringan</text>
<line x1="105" y1="190" x2="88" y2="192" stroke="#525252" stroke-width="2"/>
<line x1="105" y1="310" x2="88" y2="310" stroke="#525252" stroke-width="2"/>
<line x1="105" y1="430" x2="88" y2="428" stroke="#525252" stroke-width="2"/>
<text x="295" y="540" font-family="sans-serif" font-size="14" fill="#525252">Spindle</text>
<line x1="270" y1="525" x2="295" y2="535" stroke="#525252" stroke-width="2"/>
<circle cx="500" cy="170" r="12" fill="#A3A3A3" stroke="#525252" stroke-width="2"/>
<line x1="500" y1="170" x2="300" y2="183" stroke="#525252" stroke-width="3"/>
<text x="500" y="155" font-family="sans-serif" font-size="14" fill="#525252">Actuator Arm</text>
<polygon points="285,180 305,180 295,190" fill="#F37338" stroke="#F37338" stroke-width="2"/>
<line x1="295" y1="190" x2="190" y2="100" stroke="#F37338" stroke-width="2" stroke-dasharray="4,3"/>
<text x="120" y="92" font-family="sans-serif" font-size="15" fill="#F37338" font-weight="bold">Head</text>
<text x="55" y="565" font-family="sans-serif" font-size="13" fill="#F37338">! Head crash bila menyentuh piringan</text>

<text x="900" y="62" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">Tampak Atas Piringan</text>
<circle cx="900" cy="320" r="220" fill="none" stroke="#525252" stroke-width="3"/>
<path d="M 900 320 L 900 100 A 220 220 0 0 1 1055.6 164.4 Z" fill="#F37338" fill-opacity="0.18" stroke="#F37338" stroke-width="2"/>
<circle cx="900" cy="320" r="180" fill="none" stroke="#A3A3A3" stroke-width="2"/>
<circle cx="900" cy="320" r="140" fill="none" stroke="#F37338" stroke-width="3"/>
<circle cx="900" cy="320" r="100" fill="none" stroke="#A3A3A3" stroke-width="2"/>
<circle cx="900" cy="320" r="60" fill="none" stroke="#A3A3A3" stroke-width="2"/>
<line x1="900" y1="100" x2="900" y2="540" stroke="#A3A3A3" stroke-width="2"/>
<line x1="680" y1="320" x2="1120" y2="320" stroke="#A3A3A3" stroke-width="2"/>
<line x1="744.4" y1="164.4" x2="1055.6" y2="475.6" stroke="#A3A3A3" stroke-width="2"/>
<line x1="1055.6" y1="164.4" x2="744.4" y2="475.6" stroke="#A3A3A3" stroke-width="2"/>
<circle cx="900" cy="320" r="18" fill="#A3A3A3" stroke="#525252" stroke-width="2"/>
<text x="1145" y="325" font-family="sans-serif" font-size="15" fill="#F37338" font-weight="bold">Trek</text>
<line x1="1140" y1="320" x2="1040" y2="320" stroke="#F37338" stroke-width="2"/>
<text x="1075" y="120" font-family="sans-serif" font-size="15" fill="#F37338" font-weight="bold">Sektor</text>
<line x1="1075" y1="128" x2="1005" y2="195" stroke="#F37338" stroke-width="2"/>
<path d="M 695 250 A 230 230 0 0 1 770 145" fill="none" stroke="#525252" stroke-width="2"/>
<polygon points="770,145 757,144 766,158" fill="#525252"/>
<text x="650" y="270" font-family="sans-serif" font-size="13" fill="#525252">arah putaran</text>

<rect x="60" y="620" width="1080" height="150" fill="none" stroke="#525252" stroke-width="2"/>
<text x="80" y="648" font-family="sans-serif" font-size="15" fill="#525252" font-weight="bold">Legenda</text>
<text x="80" y="678" font-family="sans-serif" font-size="14" fill="#525252">• Piringan — media magnetik tempat data disimpan</text>
<text x="80" y="703" font-family="sans-serif" font-size="14" fill="#525252">• Spindle — poros pusat yang memutar tumpukan piringan</text>
<text x="80" y="728" font-family="sans-serif" font-size="14" fill="#525252">• Actuator Arm — lengan yang menggerakkan head ke trek tujuan</text>
<text x="80" y="753" font-family="sans-serif" font-size="14" fill="#525252">• Head — komponen baca/tulis yang mengambang sangat dekat dengan piringan</text>
<text x="620" y="678" font-family="sans-serif" font-size="14" fill="#525252">• Trek — lingkaran konsentris pada permukaan piringan</text>
<text x="620" y="703" font-family="sans-serif" font-size="14" fill="#525252">• Sektor — pembagian radial sebuah trek (unit penyimpanan)</text>
<text x="620" y="728" font-family="sans-serif" font-size="13" fill="#F37338">• Highlight oranye = contoh satu trek &amp; satu sektor</text>
</svg>