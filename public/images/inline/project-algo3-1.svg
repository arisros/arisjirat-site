<text x="855" y="332">0</text>
<text x="925" y="332">0</text>
<text x="995" y="332">0</text>
<text x="1065" y="332" fill="#F37338">1</text>
<text x="855" y="402">0</text>
<text x="925" y="402">0</text>
<text x="995" y="402">0</text>
<text x="1065" y="402" fill="#F37338">1</text>
<text x="855" y="472">0</text>
<text x="925" y="472">0</text>
