<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Adjacency matrix representasi graph berarah 4 simpul">
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#525252"/>
</marker>
<marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#F37338"/>
</marker>
</defs>

<text x="180" y="70" font-family="sans-serif" font-size="20" fill="#525252">Graph berarah</text>
<text x="870" y="70" font-family="sans-serif" font-size="20" fill="#525252">Adjacency matrix</text>

<line x1="190" y1="220" x2="370" y2="220" stroke="#525252" stroke-width="2" marker-end="url(#ah)"/>
<line x1="170" y1="240" x2="170" y2="470" stroke="#525252" stroke-width="2" marker-end="url(#ah)"/>
<line x1="410" y1="240" x2="410" y2="470" stroke="#525252" stroke-width="2" marker-end="url(#ah)"/>
<line x1="190" y1="490" x2="370" y2="490" stroke="#525252" stroke-width="2" marker-end="url(#ah)"/>

<circle cx="170" cy="220" r="28" fill="none" stroke="#525252" stroke-width="3"/>
<text x="170" y="227" font-family="sans-serif" font-size="20" fill="#525252" text-anchor="middle">A</text>
<circle cx="410" cy="220" r="28" fill="none" stroke="#525252" stroke-width="3"/>
<text x="410" y="227" font-family="sans-serif" font-size="20" fill="#525252" text-anchor="middle">B</text>
<circle cx="170" cy="490" r="28" fill="none" stroke="#525252" stroke-width="3"/>
<text x="170" y="497" font-family="sans-serif" font-size="20" fill="#525252" text-anchor="middle">C</text>
<circle cx="410" cy="490" r="28" fill="none" stroke="#525252" stroke-width="3"/>
<text x="410" y="497" font-family="sans-serif" font-size="20" fill="#525252" text-anchor="middle">D</text>

<text x="610" y="340" font-family="sans-serif" font-size="14" fill="#F37338" text-anchor="middle">translasi</text>
<text x="610" y="358" font-family="sans-serif" font-size="14" fill="#F37338" text-anchor="middle">model → data</text>
<line x1="510" y1="380" x2="710" y2="380" stroke="#F37338" stroke-width="3" marker-end="url(#ao)"/>

<g font-family="sans-serif" font-size="18" fill="#525252" text-anchor="middle">
<text x="855" y="195">A</text>
<text x="925" y="195">B</text>
<text x="995" y="195">C</text>
<text x="1065" y="195">D</text>
<text x="785" y="265">A</text>
<text x="785" y="335">B</text>
<text x="785" y="405">C</text>
<text x="785" y="475">D</text>
</g>

<g stroke="#525252" stroke-width="2" fill="none">
<rect x="820" y="220" width="280" height="280"/>
<line x1="820" y1="290" x2="1100" y2="290"/>
<line x1="820" y1="360" x2="1100" y2="360"/>
<line x1="820" y1="430" x2="1100" y2="430"/>
<line x1="890" y1="220" x2="890" y2="500"/>
<line x1="960" y1="220" x2="960" y2="500"/>
<line x1="1030" y1="220" x2="1030" y2="500"/>
</g>

<g font-family="sans-serif" font-size="20" fill="#525252" text-anchor="middle">
<text x="855" y="262">0</text>
<text x="925" y="262" fill="#F37338">1</text>
<text x="995" y="262" fill="#F37338">1</text>
