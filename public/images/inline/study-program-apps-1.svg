<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img"><title>Diagram perbandingan cakupan program dan aplikasi</title><rect x="80" y="120" width="720" height="600" rx="16" fill="none" stroke="#525252" stroke-width="3"/><text x="110" y="160" font-family="sans-serif" font-size="22" fill="#525252" font-weight="bold">Program (Perangkat Lunak)</text><text x="110" y="184" font-family="sans-serif" font-size="14" fill="#F37338">Cakupan Luas</text><rect x="120" y="220" width="200" height="80" rx="8" fill="none" stroke="#525252" stroke-width="2"/><text x="220" y="255" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">Sistem</text><text x="220" y="278" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">Operasi</text><rect x="340" y="220" width="200" height="80" rx="8" fill="none" stroke="#525252" stroke-width="2"/><text x="440" y="267" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">Driver</text><rect x="560" y="220" width="200" height="80" rx="8" fill="none" stroke="#525252" stroke-width="2"/><text x="660" y="267" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">Utilitas</text><rect x="120" y="340" width="640" height="350" rx="12" fill="none" stroke="#F37338" stroke-width="3"/><text x="140" y="370" font-family="sans-serif" font-size="20" fill="#F37338" font-weight="bold">Aplikasi (Apps)</text><text x="140" y="392" font-family="sans-serif" font-size="14" fill="#525252">Spesifik — dipakai pengguna akhir</text><rect x="150" y="420" width="180" height="60" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="240" y="456" font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle">Pengolah Kata</text><rect x="350" y="420" width="180" height="60" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="440" y="456" font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle">Spreadsheet</text><rect x="550" y="420" width="180" height="60" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="640" y="456" font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle">Peramban Web</text><rect x="250" y="510" width="180" height="60" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="340" y="546" font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle">Permainan</text><rect x="450" y="510" width="180" height="60" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="540" y="546" font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle">Media Sosial</text><text x="440" y="640" font-family="sans-serif" font-size="14" fill="#525252" text-anchor="middle" font-style="italic">… dan banyak kategori lain</text><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#F37338"/></marker></defs><line x1="880" y1="450" x2="800" y2="450" stroke="#F37338" stroke-width="3" marker-end="url(#a)"/><text x="900" y="380" font-family="sans-serif" font-size="18" fill="#525252" font-weight="bold">Aplikasi berjalan</text><text x="900" y="404" font-family="sans-serif" font-size="18" fill="#525252" font-weight="bold">di atas kerangka</text><text x="900" y="428" font-family="sans-serif" font-size="18" fill="#525252" font-weight="bold">Program</text><text x="900" y="470" font-family="sans-serif" font-size="14" fill="#F37338">(OS + Driver + Utilitas</text><text x="900" y="490" font-family="sans-serif" font-size="14" fill="#F37338">menopang Aplikasi)</text><rect x="880" y="540" width="260" height="140" rx="8" fill="none" stroke="#525252" stroke-width="2" stroke-dasharray="6 4"/><text x="1010" y="570" font-family="sans-serif" font-size="15" fill="#525252" text-anchor="middle" font-weight="bold">Ringkasan</text><text x="900" y="600" font-family="sans-serif" font-size="13" fill="#525252">Program ⊇ Aplikasi</text><text x="900" y="624" font-family="sa