<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Diagram komponen utama di dalam casing komputer dan hubungannya">
<rect x="60" y="60" width="1080" height="680" rx="8" fill="none" stroke="#525252" stroke-width="3" stroke-dasharray="8 6"/>
<text x="80" y="95" font-family="sans-serif" font-size="16" fill="#525252">Casing Komputer</text>

<rect x="320" y="180" width="720" height="500" rx="6" fill="none" stroke="#525252" stroke-width="3"/>
<text x="340" y="215" font-family="sans-serif" font-size="20" fill="#525252">Motherboard</text>

<rect x="380" y="260" width="240" height="160" rx="4" fill="none" stroke="#525252" stroke-width="3"/>
<text x="500" y="335" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#525252">Processor</text>
<text x="500" y="360" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#525252">(CPU)</text>

<rect x="720" y="260" width="260" height="70" rx="4" fill="none" stroke="#525252" stroke-width="3"/>
<text x="850" y="305" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#525252">Memory (RAM)</text>
<rect x="720" y="350" width="260" height="70" rx="4" fill="none" stroke="#525252" stroke-width="3"/>
<text x="850" y="395" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#525252">Memory (RAM)</text>

<rect x="380" y="500" width="600" height="120" rx="4" fill="none" stroke="#525252" stroke-width="3"/>
<text x="680" y="545" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#525252">Adapter</text>
<text x="680" y="575" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#525252">(Kartu Ekspansi: VGA / Sound / LAN)</text>
<line x1="420" y1="600" x2="940" y2="600" stroke="#A3A3A3" stroke-width="2"/>
<line x1="450" y1="600" x2="450" y2="620" stroke="#A3A3A3" stroke-width="2"/>
<line x1="550" y1="600" x2="550" y2="620" stroke="#A3A3A3" stroke-width="2"/>
<line x1="650" y1="600" x2="650" y2="620" stroke="#A3A3A3" stroke-width="2"/>
<line x1="750" y1="600" x2="750" y2="620" stroke="#A3A3A3" stroke-width="2"/>
<line x1="850" y1="600" x2="850" y2="620" stroke="#A3A3A3" stroke-width="2"/>

<line x1="620" y1="340" x2="720" y2="340" stroke="#525252" stroke-width="2"/>
<polygon points="720,340 712,336 712,344" fill="#525252"/>
<line x1="720" y1="380" x2="620" y2="380" stroke="#525252" stroke-width="2"/>
<polygon points="620,380 628,376 628,384" fill="#525252"/>

<line x1="500" y1="420" x2="500" y2="500" stroke="#525252" stroke-width="2"/>
<polygon points="500,500 496,492 504,492" fill="#525252"/>
<line x1="850" y1="420" x2="850" y2="500" stroke="#525252" stroke-width="2"/>
<polygon points="850,500 846,492 854,492" fill="#525252"/>

<rect x="100" y="300" width="180" height="220" rx="6" fill="none" stroke="#525252" stroke-width="3"/>
<text x="190" y="395" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#525252">Power Supply</text>
<text x="190" y="420" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#525252">&amp;</text>
<text x="190" y="445" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#525252">Baterai</text>

<line x1="100" y1="360" x2="40" y2="360" stroke="#F37338" stroke-width="3"/>
<polygon points="100,360 92,356 92,364" fill="#F37338"/>
<text x="45" y="345" font-family="sans-serif" font-size="14" fill="#F37338">AC In</text>

<line x1="280" y1="340" x2="380" y2="340" stroke="#F37338" stroke-width="3"/>
<polygon points="380,340 372,336 372,344" fill="#F37338"/>
<text x="300" y="330" font-family="sans-serif" font-size="14" fill="#F37338">DC → CPU</text>

<line x1="280" y1="410" x2="320" y2="410" stroke="#F37338" stroke-width="3"/>
<line x1="320" y1="410" x2="320" y2="200" stroke="#F37338" stroke-width="3"/>
<line x1="320" y1="200" x2="700" y2="200" stroke="#F37338" stroke-width="3"/>
<polygon points="700,200 692,196 692,204" fill="#F37338"/>
<text x="290" y="400" font-family="sans-serif" font-size="14" fill="#F37338">DC → Motherboard</text>

<line x1="280" y1="480" x2="340" y2="480" stroke="#F37338" stroke-width="3"/>
<line x1="340" y1="480" x2="340" y2="295" stroke="#F37338" stroke-width="3"/>
<line x1="340" y1="295" x2="720" y2="295" stroke="#F37338" stroke-width="3"/>
<polygon points="720,295 712,291 712,299" fill="#F37338"/>
<text x="290" y="500" font-family="sans-serif" font-size="14" fill="#F37338">DC → RAM</text>

<text x="600" y="730" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#A3A3A3">Garis abu-abu: aliran data    Garis oranye: aliran daya</text>
</svg>