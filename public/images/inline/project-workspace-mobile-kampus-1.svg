<text x="600" y="760" font-family="sans-serif" font-size="14" fill="#F37338" text-anchor="middle" font-weight="bold">OAuth Redirect Flow</text>
<text x="430" y="700" font-family="sans-serif" font-size="13" fill="#525252">1. app launches</text>
<text x="430" y="718" font-family="sans-serif" font-size="13" fill="#525252">   provider URL</text>
<text x="740" y="700" font-family="sans-serif" font-size="13" fill="#525252">2. Supabase issues</text>
<text x="740" y="718" font-family="sans-serif" font-size="13" fill="#525252">   session token</text>
<text x="500" y="660" font-family="sans-serif" font-size="13" fill="#525252">3. redirect → app via REDIRECT_URL</text>
</svg>