<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Arsitektur Workspacebook Mobile: Flutter klien dengan Supabase backend">
<g fill="none" stroke="#525252" stroke-width="2">
