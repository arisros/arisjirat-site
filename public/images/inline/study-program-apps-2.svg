<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img"><title>Diagram lapisan sistem operasi sebagai penghubung perangkat keras dan aplikasi</title><g font-family="sans-serif" fill="#525252"><text x="600" y="40" font-size="20" text-anchor="middle">Lapisan Sistem Operasi</text><g stroke="#525252" stroke-width="2" fill="none"><rect x="80" y="80" width="1040" height="160" rx="6"/><rect x="80" y="320" width="1040" height="160" rx="6"/><rect x="80" y="560" width="1040" height="160" rx="6"/></g><text x="110" y="110" font-size="18" fill="#F37338">Aplikasi</text><g stroke="#525252" stroke-width="2" fill="none"><rect x="130" y="140" width="200" height="70" rx="4"/><rect x="360" y="140" width="200" height="70" rx="4"/><rect x="590" y="140" width="200" height="70" rx="4"/><rect x="820" y="140" width="240" height="70" rx="4"/></g><g font-size="15" text-anchor="middle"><text x="230" y="182">Word Processor</text><text x="460" y="182">Browser</text><text x="690" y="182">Games</text><text x="940" y="182">Media Player</text></g><text x="110" y="350" font-size="18" fill="#F37338">Sistem Operasi</text><g stroke="#525252" stroke-width="2" fill="none"><rect x="130" y="380" width="200" height="70" rx="4"/><rect x="360" y="380" width="200" height="70" rx="4"/><rect x="590" y="380" width="200" height="70" rx="4"/><rect x="820" y="380" width="240" height="70" rx="4"/></g><g font-size="15" text-anchor="middle"><text x="230" y="422">Kernel</text><text x="460" y="422">File System</text><text x="690" y="422">Device Drivers</text><text x="940" y="422">Memory Management</text></g><text x="110" y="590" font-size="18" fill="#F37338">Perangkat Keras</text><g stroke="#525252" stroke-width="2" fill="none"><rect x="130" y="620" width="200" height="70" rx="4"/><rect x="360" y="620" width="200" height="70" rx="4"/><rect x="590" y="620" width="200" height="70" rx="4"/><rect x="820" y="620" width="240" height="70" rx="4"/></g><g font-size="15" text-anchor="middle"><text x="230" y="662">CPU</text><text x="460" y="662">RAM</text><text x="690" y="662">Storage</text><text x="940" y="662">I/O Devices</text></g><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#F37338"/></marker></defs><g stroke="#F37338" stroke-width="3" fill="none"><line x1="400" y1="320" x2="400" y2="245" marker-end="url(#a)"/><line x1="400" y1="240" x2="400" y2="315" marker-end="url(#a)"/><line x1="800" y1="320" x2="800" y2="245" marker-end="url(#a)"/><line x1="800" y1="240" x2="800" y2="315" marker-end="url(#a)"/><line x1="400" y1="560" x2="400" y2="485" marker-end="url(#a)"/><line x1="400" y1="480" x2="400" y2="555" marker-end="url(#a)"/><line x1="800" y1="560" x2="800" y2="485" marker-end="url(#a)"/><line x1="800" y1="480" x2="800" y2="555" marker-end="url(#a)"/></g><g font-size="13" text-anchor="middle" font-style="italic"><text x="600" y="285">system calls / API</text><text x="600" y="525">drivers / instruksi perangkat keras</text></g></g></svg>