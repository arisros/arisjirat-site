</g>
<circle cx="600" cy="700" r="80" fill="none" stroke="#525252" stroke-width="3"/>
<g font-family="sans-serif" text-anchor="middle">
<text x="600" y="685" font-size="20" fill="#525252">Heksadesimal</text>
<text x="600" y="707" font-size="14" fill="#525252">(basis 16)</text>
<text x="600" y="727" font-size="14" fill="#525252">{0–9, A–F}</text>
</g>
<circle cx="160" cy="400" r="80" fill="none" stroke="#525252" stroke-width="3" stroke-dasharray="4 4" opacity="0.4"/>
<g font-family="sans-serif" text-anchor="middle" fill="#525252" opacity="0.6">
<text x="160" y="395" font-size="14">basis lain</text>
<text x="160" y="415" font-size="14">(via desimal)</text>
</g>
</svg>