<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Pipeline pelacakan quiz dan assignment dari Moodle ke notifikasi WhatsApp">
<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#525252"/></marker>
</defs>
<g font-family="sans-serif" fill="#525252">

<g transform="translate(40,340)">
<path d="M30,60 a30,30 0 0,1 10,-58 a35,35 0 0,1 65,-10 a30,30 0 0,1 55,18 a25,25 0 0,1 -10,50 z" fill="none" stroke="#525252" stroke-width="3"/>
<text x="85" y="125" text-anchor="middle" font-size="18" font-weight="bold">Moodle</text>
<text x="85" y="148" text-anchor="middle" font-size="13">source</text>
</g>

<line x1="210" y1="400" x2="270" y2="400" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>

<g transform="translate(270,310)">
<rect width="220" height="180" fill="none" stroke="#525252" stroke-width="3" rx="6"/>
<text x="110" y="30" text-anchor="middle" font-size="17" font-weight="bold">List parser</text>
<line x1="20" y1="48" x2="200" y2="48" stroke="#A3A3A3" stroke-width="2"/>
<text x="110" y="72" text-anchor="middle" font-size="13" font-weight="bold">assignments</text>
<text x="110" y="92" text-anchor="middle" font-size="12">due date · submission · grade</text>
<line x1="40" y1="108" x2="180" y2="108" stroke="#A3A3A3" stroke-width="2" stroke-dasharray="4 3"/>
<text x="110" y="132" text-anchor="middle" font-size="13" font-weight="bold">quizzes</text>
<text x="110" y="152" text-anchor="middle" font-size="12">close date · grade</text>
</g>

<line x1="490" y1="400" x2="550" y2="400" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>

<g transform="translate(550,330)">
<rect width="190" height="140" fill="none" stroke="#525252" stroke-width="3" rx="6"/>
<text x="95" y="40" text-anchor="middle" font-size="17" font-weight="bold">Detail fetch</text>
<text x="95" y="62" text-anchor="middle" font-size="17" font-weight="bold">pipeline</text>
<rect x="30" y="85" width="130" height="32" fill="none" stroke="#F37338" stroke-width="2" rx="16"/>
<text x="95" y="106" text-anchor="middle" font-size="13" fill="#F37338" font-weight="bold">max N per run</text>
</g>

<line x1="740" y1="400" x2="810" y2="400" stroke="#525252" stroke-width="2"/>
<circle cx="810" cy="400" r="6" fill="#F37338"/>
<path d="M810,400 L860,260 L900,260" fill="none" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>
<path d="M810,400 L860,540 L900,540" fill="none" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>

<g transform="translate(900,210)">
<rect width="240" height="100" fill="none" stroke="#525252" stroke-width="3" rx="6"/>
<text x="120" y="34" text-anchor="middle" font-size="15" font-weight="bold">Deadline reminders</text>
<text x="120" y="58" text-anchor="middle" font-size="13">windows</text>
<rect x="55" y="68" width="60" height="22" fill="none" stroke="#F37338" stroke-width="2" rx="11"/>
<text x="85" y="84" text-anchor="middle" font-size="12" fill="#F37338">24h</text>
<rect x="125" y="68" width="60" height="22" fill="none" stroke="#F37338" stroke-width="2" rx="11"/>
<text x="155" y="84" text-anchor="middle" font-size="12" fill="#F37338">12h</text>
</g>

<g transform="translate(900,490)">
<rect width="240" height="100" fill="none" stroke="#525252" stroke-width="3" rx="6" stroke-dasharray="6 4"/>
<text x="120" y="34" text-anchor="middle" font-size="15" font-weight="bold">AI suggestions</text>
<text x="120" y="58" text-anchor="middle" font-size="13">via OpenRouter</text>
<text x="120" y="82" text-anchor="middle" font-size="12" fill="#F37338">optional</text>
</g>

<path d="M1140,310 L1170,310 L1170,400" fill="none" stroke="#525252" stroke-width="2"/>
<path d="M1140,540 L1170,540 L1170,400" fill="none" stroke="#525252" stroke-width="2"/>
<circle cx="1170" cy="400" r="5" fill="#525252"/>

<path d="M1170,400 L1170,680 L600,680 L600,640" fill="none" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>

<g transform="translate(480,640)">
<rect width="240" height="110" fill="none" stroke="#F37338" stroke-width="3" rx="6"/>
<text x="120" y="40" text-anchor="middle" font-size="17" font-weight="bold" fill="#F37338">WhatsApp</text>
<text x="120" y="64" text-anchor="middle" font-size="15" fill="#F37338">notification</text>
<text x="120" y="90" text-anchor="middle" font-size="12">output</text>
</g>

<text x="60" y="60" font-size="13">Stage 1</text>
<text x="340" y="290" font-size="13">Stage 2</text>
<text x="610" y="310" font-size="13">Stage 3</text>
<text x="950" y="190" font-size="13">Stage 4</text>
<text x="540" y="625" font-size="13">Stage 5</text>

</g>
</svg>