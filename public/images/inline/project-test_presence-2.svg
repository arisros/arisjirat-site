<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img"><title>Alur check-in GPS: validasi lokasi karyawan terhadap radius kantor</title><g font-family="sans-serif" font-size="15" fill="#525252"><rect x="40" y="60" width="200" height="70" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="140" y="88" text-anchor="middle">Perangkat Karyawan</text><text x="140" y="108" text-anchor="middle" font-size="13">kirim koordinat GPS</text><rect x="40" y="200" width="200" height="70" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="140" y="228" text-anchor="middle">Backend menerima</text><text x="140" y="248" text-anchor="middle" font-size="13">lat, lng karyawan</text><rect x="40" y="340" width="200" height="80" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="140" y="368" text-anchor="middle">Ambil konfigurasi</text><text x="140" y="386" text-anchor="middle" font-size="13">pusat kantor &amp;</text><text x="140" y="404" text-anchor="middle" font-size="13">radius diizinkan</text><rect x="40" y="490" width="200" height="70" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="140" y="518" text-anchor="middle">Hitung jarak</text><text x="140" y="538" text-anchor="middle" font-size="13">haversine(emp, kantor)</text><path d="M 380 600 L 540 540 L 700 600 L 540 660 Z" fill="none" stroke="#525252" stroke-width="2"/><text x="540" y="595" text-anchor="middle">Jarak &lt;= radius?</text><text x="540" y="618" text-anchor="middle" font-size="13">validasi posisi</text><rect x="780" y="490" width="200" height="70" rx="6" fill="none" stroke="#F37338" stroke-width="3"/><text x="880" y="518" text-anchor="middle" fill="#F37338">Absensi tercatat</text><text x="880" y="538" text-anchor="middle" font-size="13">simpan ke DB</text><rect x="780" y="640" width="200" height="70" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="880" y="668" text-anchor="middle">Check-in ditolak</text><text x="880" y="688" text-anchor="middle" font-size="13">di luar radius</text><g fill="none" stroke="#525252" stroke-width="2"><path d="M 140 130 L 140 195"/><path d="M 140 270 L 140 335"/><path d="M 140 420 L 140 485"/><path d="M 240 525 L 380 600"/><path d="M 700 580 L 780 525"/><path d="M 700 620 L 780 675"/></g><g fill="#525252"><polygon points="140,200 135,190 145,190"/><polygon points="140,340 135,330 145,330"/><polygon points="140,490 135,480 145,480"/><polygon points="380,600 370,597 370,603"/><polygon points="780,525 770,524 772,532"/><polygon points="780,675 770,668 772,676"/></g><text x="540" y="498" font-size="13" fill="#F37338" text-anchor="middle">ya</text><text x="740" y="640" font-size="13" text-anchor="middle">tidak</text><g transform="translate(820,60)"><rect x="0" y="0" width="320" height="220" rx="6" fill="none" stroke="#525252" stroke-width="2"/><text x="160" y="22" text-anchor="middle" font-size="14">Pratinjau peta</text><circle cx="160" cy="130" r="70" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-dasharray="5 4"/><text x="160" y="212" text-anchor="middle" font-size="12">radius diizinkan</text><path d="M 160 95 C 145 95 138 108 138 120 C 138 138 160 160 160 160 C 160 160 182 138 182 120 C 182 108 175 95 160 95 Z" fill="none" stroke="#F37338" stroke-width="3"/><circle cx="160" cy="120" r="6" fill="#F37338"/><text x="195" y="118" font-size="12" fill="#F37338">kantor</text><circle cx="130" cy="150" r="6" fill="none" stroke="#525252" stroke-width="2"/><text x="95" y="170" font-size="12">karyawan</text></g></g></svg>