<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img">
<text x="240" y="60" font-family="sans-serif" font-size="22" fill="#525252" text-anchor="middle" font-weight="bold">API Endpoints</text>
<text x="960" y="60" font-family="sans-serif" font-size="22" fill="#525252" text-anchor="middle" font-weight="bold">CLI Commands</text>
<line x1="80" y1="80" x2="400" y2="80" stroke="#525252" stroke-width="2"/>
<line x1="800" y1="80" x2="1120" y2="80" stroke="#525252" stroke-width="2"/>

<rect x="80" y="120" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4"/>
<text x="240" y="156" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">GET /courses</text>

<rect x="80" y="220" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4"/>
<text x="240" y="256" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">GET /courses/:id</text>

<rect x="80" y="320" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4" stroke-dasharray="6 4"/>
<text x="240" y="356" font-family="sans-serif" font-size="16" fill="#A3A3A3" text-anchor="middle">GET /courses/:id/assignments</text>

<rect x="80" y="420" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4" stroke-dasharray="6 4"/>
<text x="240" y="456" font-family="sans-serif" font-size="16" fill="#A3A3A3" text-anchor="middle">GET /courses/:id/quizzes</text>

<rect x="80" y="520" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4"/>
<text x="240" y="556" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">POST /courses/:id/present</text>

<rect x="800" y="170" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4"/>
<text x="960" y="206" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">beepresent list</text>

<rect x="800" y="320" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4"/>
<text x="960" y="356" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">beepresent show &lt;id&gt;</text>

<rect x="800" y="500" width="320" height="60" fill="none" stroke="#525252" stroke-width="2" rx="4"/>
<text x="960" y="536" font-family="sans-serif" font-size="16" fill="#525252" text-anchor="middle">beepresent present &lt;id&gt;</text>

<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
</marker>
<marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,0 L10,5 L0,10 z" fill="#A3A3A3"/>
</marker>
</defs>

<line x1="400" y1="150" x2="800" y2="200" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>
<line x1="400" y1="250" x2="800" y2="350" stroke="#525252" stroke-width="2" marker-end="url(#a)"/>
<line x1="400" y1="550" x2="800" y2="530" stroke="#F37338" stroke-width="3" marker-end="url(#a)"/>

<line x1="400" y1="350" x2="560" y2="350" stroke="#A3A3A3" stroke-width="2" stroke-dasharray="4 4"/>
<circle cx="565" cy="350" r="4" fill="none" stroke="#A3A3A3" stroke-width="2"/>
<line x1="400" y1="450" x2="560" y2="450" stroke="#A3A3A3" stroke-width="2" stroke-dasharray="4 4"/>
<circle cx="565" cy="450" r="4" fill="none" stroke="#A3A3A3" stroke-width="2"/>

<text x="600" y="690" font-family="sans-serif" font-size="18" fill="#F37338" text-anchor="middle" font-style="italic">CLI mirrors API surface</text>
<line x1="450" y1="710" x2="750" y2="710" stroke="#F37338" stroke-width="2"/>

<text x="585" y="400" font-family="sans-serif" font-size="14" fill="#A3A3A3" text-anchor="start">no CLI</text>
<text x="585" y="500" font-family="sans-serif" font-size="14" fill="#A3A3A3" text-anchor="start">no CLI</text>
</svg>