<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Diagram alur workflow CLI: build, install, run, uninstall APK">
<g font-family="sans-serif" font-size="18" fill="#525252">

<g stroke="#525252" stroke-width="2" fill="none">
<rect x="80" y="180" width="220" height="140" rx="6"/>
<rect x="370" y="180" width="220" height="140" rx="6"/>
<rect x="660" y="180" width="220" height="140" rx="6"/>
<rect x="950" y="180" width="220" height="140" rx="6"/>
</g>

<g text-anchor="middle">
<text x="190" y="220" font-size="22" fill="#F37338">1. Build APK</text>
<text x="190" y="260">gradlew</text>
<text x="190" y="285">assembleDebug</text>

<text x="480" y="220" font-size="22" fill="#F37338">2. Install</text>
<text x="480" y="260">adb install</text>
<text x="480" y="285">app-debug.apk</text>

<text x="770" y="220" font-size="22" fill="#F37338">3. Run</text>
<text x="770" y="260">adb shell am start</text>
<text x="770" y="285">-n pkg/.Main</text>

<text x="1060" y="220" font-size="22" fill="#F37338">4. Uninstall</text>
<text x="1060" y="260">adb uninstall</text>
<text x="1060" y="285">com.example.app</text>
</g>

<defs>
<marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
<path d="M0,0 L10,5 L0,10 z" fill="#525252"/>
</marker>
</defs>

<g stroke="#525252" stroke-width="3" fill="none" marker-end="url(#a)">
<line x1="300" y1="250" x2="365" y2="250"/>
<line x1="590" y1="250" x2="655" y2="250"/>
<line x1="880" y1="250" x2="945" y2="250"/>
</g>

<g stroke="#525252" stroke-width="2" fill="none">
<path d="M190,320 L190,360"/>
<path d="M480,320 L480,360"/>
<path d="M770,320 L770,360"/>
<path d="M1060,320 L1060,360"/>
</g>

<g transform="translate(190,400)">
<rect x="-55" y="-20" width="110" height="70" rx="4" stroke="#525252" stroke-width="2" fill="none"/>
<text x="0" y="5" text-anchor="middle" font-size="14">APK file</text>
<rect x="-30" y="15" width="60" height="25" stroke="#F37338" stroke-width="2" fill="none"/>
<text x="0" y="33" text-anchor="middle" font-size="14" fill="#F37338">.apk</text>
</g>

<g transform="translate(480,400)" stroke="#525252" stroke-width="2" fill="none">
<rect x="-35" y="-20" width="70" height="100" rx="8"/>
<rect x="-25" y="-10" width="50" height="70"/>
<circle cx="0" cy="70" r="4"/>
</g>
<text x="480" y="510" text-anchor="middle" font-size="14">Device / Emulator</text>

<g transform="translate(770,400)" stroke="#525252" stroke-width="2" fill="none">
<rect x="-35" y="-20" width="70" height="100" rx="8"/>
<rect x="-25" y="-10" width="50" height="70" fill="#F37338" fill-opacity="0.15"/>
<circle cx="0" cy="-15" r="6" stroke="#F37338"/>
<path d="M-12,15 L0,5 L12,15 M0,5 L0,40" stroke="#F37338"/>
</g>
<text x="770" y="510" text-anchor="middle" font-size="14" fill="#F37338">App running</text>

<g transform="translate(1060,400)" stroke="#525252" stroke-width="2" fill="none">
<rect x="-35" y="-20" width="70" height="100" rx="8"/>
<rect x="-25" y="-10" width="50" height="70" stroke-dasharray="4 3"/>
<path d="M-15,5 L15,35 M15,5 L-15,35" stroke="#F37338"/>
</g>
<text x="1060" y="510" text-anchor="middle" font-size="14">App removed</text>

<g transform="translate(120,640)" stroke="#525252" stroke-width="2" fill="none">
<rect x="0" y="0" width="180" height="110" rx="6"/>
<line x1="0" y1="25" x2="180" y2="25"/>
<circle cx="15" cy="13" r="4" fill="#F37338" stroke="none"/>
<circle cx="30" cy="13" r="4" fill="#A3A3A3" stroke="none"/>
<circle cx="45" cy="13" r="4" fill="#A3A3A3" stroke="none"/>
<text x="15" y="55" font-size="14" fill="#F37338">$</text>
<text x="30" y="55" font-size="14">adb ...</text>
<text x="15" y="80" font-size="14" fill="#F37338">$</text>
<text x="30" y="80" font-size="14">gradlew ...</text>
</g>
<text x="210" y="775" text-anchor="middle" font-size="14">Developer terminal — no Android Studio</text>

<g stroke="#F37338" stroke-width="2" fill="none" stroke-dasharray="5 4" marker-end="url(#a)">
<path d="M300,670 C400,670 120,250 185,250"/>
<path d="M300,690 C500,690 400,250 475,250"/>
<path d="M300,710 C650,710 680,250 765,250"/>
<path d="M300,730 C850,730 980,250 1055,250"/>
</g>

<text x="600" y="90" text-anchor="middle" font-size="22" fill="#525252">Android CLI Workflow</text>
<text x="600" y="120" text-anchor="middle" font-size="14">build → install → run → uninstall</text>

</g>
</svg>