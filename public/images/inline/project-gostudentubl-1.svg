<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img"><title>Diagram jaringan Docker bersama menghubungkan stack gostudentubl dan WhatsApp</title><rect x="40" y="40" width="1120" height="720" rx="10" fill="none" stroke="#525252" stroke-width="2" stroke-dasharray="6 4"/><text x="60" y="70" font-family="sans-serif" font-size="16" fill="#525252">same Docker host</text><rect x="100" y="130" width="420" height="340" rx="14" fill="none" stroke="#525252" stroke-width="3"/><text x="120" y="165" font-family="sans-serif" font-size="18" fill="#525252">gostudentubl stack</text><rect x="170" y="220" width="280" height="100" rx="8" fill="none" stroke="#525252" stroke-width="2"/><text x="310" y="275" font-family="sans-serif" font-size="18" fill="#525252" text-anchor="middle">gostudentubl-agent</text><rect x="680" y="130" width="420" height="340" rx="14" fill="none" stroke="#525252" stroke-width="3"/><text x="700" y="165" font-family="sans-serif" font-size="18" fill="#525252">whatsapp stack</text><rect x="750" y="220" width="280" height="100" rx="8" fill="none" stroke="#525252" stroke-width="2"/><text x="890" y="275" font-family="sans-serif" font-size="18" fill="#525252" text-anchor="middle">wa-bot-notif</text><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#525252"/></marker><marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#F37338"/></marker></defs><line x1="310" y1="320" x2="310" y2="600" stroke="#525252" stroke-width="2" marker-end="url(#a)"/><line x1="890" y1="320" x2="890" y2="600" stroke="#525252" stroke-width="2" marker-end="url(#a)"/><rect x="100" y="610" width="1000" height="80" rx="10" fill="none" stroke="#525252" stroke-width="3"/><text x="600" y="658" font-family="sans-serif" font-size="18" fill="#525252" text-anchor="middle">shared external Docker network</text><path d="M 310 250 C 400 90, 800 90, 890 250" fill="none" stroke="#F37338" stroke-width="3" marker-end="url(#b)"/><text x="600" y="100" font-family="sans-serif" font-size="16" fill="#F37338" text-anchor="middle">service DNS call</text><line x1="450" y1="285" x2="750" y2="285" stroke="#525252" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#a)"/><line x1="560" y1="265" x2="640" y2="305" stroke="#F37338" stroke-width="3"/><line x1="640" y1="265" x2="560" y2="305" stroke="#F37338" stroke-width="3"/><text x="600" y="335" font-family="sans-serif" font-size="14" fill="#525252" text-anchor="middle">localhost (do NOT use)</text></svg>